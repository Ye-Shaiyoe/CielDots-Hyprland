################
### MONITORS ###
################

monitor=,preferred,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = firefox


#################
### AUTOSTART ###
#################

exec-once = bash ~/.config/hypr/scripts/startup.sh


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


#####################
### LOOK AND FEEL ###
#####################
# ┌─────────────────────────────────────────┐
# │  Rimuru Tempest — Slime Lord Theme      │
# │  Abyss navy · Slime cyan · Magic purple │
# └─────────────────────────────────────────┘

general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2

    # Cyan slime glow → magic purple aura
    col.active_border   = rgba(00e5ffcc) rgba(7c4dffcc) 45deg
    col.inactive_border = rgba(1a254088)

    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding = 12

    # Windows are transparent — you see the world through Rimuru's slime body
    active_opacity   = 0.92
    inactive_opacity = 0.82

    shadow {
        enabled      = true
        range        = 20
        render_power = 4
        # Cyan shadow glow
        color        = rgba(00e5ff22)
        color_inactive = rgba(00000044)
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        noise             = 0.015
        contrast          = 0.9
        brightness        = 0.8
        vibrancy          = 0.20
        vibrancy_darkness = 0.4
        new_optimizations = true
        xray              = false

        # Kitty gets its own blur treatment via special_fallthrough
        # Other apps inherit this global blur
        ignore_opacity    = false
        popups            = true
    }
}

animations {
    enabled = true

    # Slime physics — stretchy, bouncy, fluid
    bezier = slime,      0.0, 0.9, 0.1, 1.08
    bezier = slimeIn,    0.1, 1.2, 0.1, 1.0
    bezier = slimeOut,   0.4, -0.2, 0.6, 1.0
    bezier = slimeMove,  0.05, 0.9, 0.1, 1.05
    bezier = linear,     0.0,  0.0, 1.0, 1.0
    bezier = ripple,     0.68, -0.6, 0.32, 1.6

    animation = windows,     1, 4,  slime,    slide
    animation = windowsIn,   1, 4,  slimeIn,  slide
    animation = windowsOut,  1, 3,  slimeOut, slide
    animation = windowsMove, 1, 4,  slimeMove
    animation = border,      1, 10, linear
    animation = borderangle, 1, 240, linear, loop
    animation = fade,        1, 4,  slime
    animation = workspaces,  1, 4,  ripple,   slidevert
    animation = specialWorkspace, 1, 4, slimeIn, slide
}

dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    animate_manual_resizes  = true
    animate_mouse_windowdragging = true
}


############
### INPUT ###
############

input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll      = true
        disable_while_typing = true
        tap-to-click         = true
    }
}

gestures {
    workspace_swipe         = true
    workspace_swipe_fingers = 3
}


####################
### KEYBINDINGS  ###
####################

$mainMod = SUPER

# Apps
bind = $mainMod,       T, exec, $terminal
bind = $mainMod,       E,      exec, $fileManager
bind = $mainMod,       Space,  exec, bash ~/.config/hypr/scripts/launcher.sh apps
bind = $mainMod,       B,      exec, $browser

# Launcher modes
bind = $mainMod SHIFT, P,      exec, bash ~/.config/hypr/scripts/launcher.sh power
bind = $mainMod SHIFT, C,      exec, bash ~/.config/hypr/scripts/launcher.sh clipboard
bind = $mainMod,       Period, exec, bash ~/.config/hypr/scripts/launcher.sh emoji

# Notification controls
bind = $mainMod,       N,      exec, bash ~/.config/hypr/scripts/notif.sh history
bind = $mainMod SHIFT, N,      exec, bash ~/.config/hypr/scripts/notif.sh dnd

# Weather widget
bind = $mainMod SHIFT, W,      exec, python3 ~/.config/hypr/scripts/weather.py --widget

# Color scheme
bind = $mainMod SHIFT, X,      exec, python3 ~/.config/hypr/scripts/colorscheme.py --reload
bind = $mainMod CTRL,  X,      exec, python3 ~/.config/hypr/scripts/colorscheme.py --show

# Window management
bind = $mainMod,       Q,      killactive,
bind = $mainMod SHIFT, Q,      exit,
bind = $mainMod,       V,      togglefloating,
bind = $mainMod,       P,      pseudo,
bind = $mainMod,       F,      fullscreen,

# Screenshot
bind = ,               Print,  exec, bash ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod,       Print,  exec, bash ~/.config/hypr/scripts/screenshot.sh full
bind = SHIFT,          Print,  exec, bash ~/.config/hypr/scripts/screenshot.sh window
bind = CTRL,           Print,  exec, bash ~/.config/hypr/scripts/screenshot.sh area --edit

# Lock screen
bind = $mainMod,       L,      exec, hyprlock

# Wallpaper
bind = $mainMod SHIFT, W,      exec, bash ~/.config/hypr/scripts/wallpaper.sh
bind = $mainMod CTRL,  W,      exec, bash ~/.config/hypr/scripts/wallpaper.sh --next

# Gaming mode toggle
bind = $mainMod SHIFT, G,      exec, bash ~/.config/hypr/scripts/gaming-mode.sh

# Volume & Brightness
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 10%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Move focus
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , right, resizeactive,  10  0
binde = , left,  resizeactive, -10  0
binde = , up,    resizeactive,   0 -10
binde = , down,  resizeactive,   0  10
bind  = , escape, submap, reset
submap = reset


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = suppressevent maximize, class:.*

# Float specific apps
windowrulev2 = float, class:^(thunar)$,             title:^(File Operation Progress)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$

# ── Transparency + Blur rules ─────────────────────────────────
# Kitty: let kitty.conf control opacity (background_opacity 0.82)
# Hyprland blur handles the rest — DON'T set opacity here for kitty
# so blur gets the full alpha channel to work with
windowrulev2 = opacity 1.0 override 1.0 override, class:^(kitty)$
windowrulev2 = opacity 0.95 0.88, class:^(firefox)$
windowrulev2 = opacity 0.92 0.82, class:^(thunar)$
windowrulev2 = opacity 1.00 0.95, class:^(code-oss|codium|Code)$

# Force blur even on transparent kitty windows
windowrulev2 = bordersize 2, class:^(kitty)$

# Workspace names (Rimuru's skills as workspace labels)
workspace = 1, name:「Predator」
workspace = 2, name:「Great Sage」
workspace = 3, name:「Storm」
workspace = 4, name:「Gluttony」
workspace = 5, name:「Raphael」
