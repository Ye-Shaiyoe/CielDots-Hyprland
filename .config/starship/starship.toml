# Starship Prompt - Catppuccin Mocha
# https://starship.rs

format = """
[╭─](surface1) $os$username$hostname$directory$git_branch$git_status$python$nodejs$rust$golang$docker_context
[╰─](surface1)$character"""

add_newline = true

palette = 'catppuccin_mocha'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
style = "bold mauve"

[os.symbols]
Gentoo = " "
Arch = " "
Ubuntu = " "
Debian = " "
Fedora = " "
Windows = " "
Macos = " "

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false
show_always = false

[hostname]
ssh_only = true
format = "[@$hostname](bold yellow) "

[directory]
style = "bold lavender"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"~" = " "

[git_branch]
symbol = " "
style = "bold green"
format = "[$symbol$branch]($style) "
truncation_length = 20

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "󰏗"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[python]
symbol = " "
style = "bold yellow"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style = "bold peach"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style = "bold sky"
format = "[$symbol$version]($style) "

[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[cmd_duration]
style = "bold yellow"
format = "[ $duration]($style) "
min_time = 2000
