# /* ---- 💫 CielDots — Rimuru Tempest Color Theme 💫 ---- */
# Abyss navy · Slime cyan · Magic purple
# Drop in ~/.config/kitty/themes/ — selected via include in kitty.conf

# ── Core ─────────────────────────────────────────────────────
foreground   #c8d6e8
background   #0a0e1a
cursor       #00e5ff
cursor_text_color #0a0e1a

# ── Selection ────────────────────────────────────────────────
selection_foreground #0a0e1a
selection_background #00e5ff

# ── URL ──────────────────────────────────────────────────────
url_color #29b6f6

# ── Window borders ───────────────────────────────────────────
active_border_color   #00e5ff
inactive_border_color #1a2540
bell_border_color     #ffb300

# ── Tab bar ──────────────────────────────────────────────────
active_tab_foreground   #0a0e1a
active_tab_background   #00e5ff
inactive_tab_foreground #4a607a
inactive_tab_background #0d1420
tab_bar_background      #080c14
tab_bar_margin_color    #080c14

# ── ANSI 16 ──────────────────────────────────────────────────

# black — abyss
color0  #111827
color8  #1a2540

# red — danger
color1  #ff5252
color9  #ff6e6e

# green — slime glow / ok
color2  #00e676
color10 #69ffb3

# yellow — tempest amber / warning
color3  #ffb300
color11 #ffd740

# blue — calm water
color4  #29b6f6
color12 #64d8ff

# magenta — magic aura
color5  #aa80ff
color13 #c4a0ff

# cyan — slime / primary accent
color6  #00e5ff
color14 #18ffff

# white — silver mist
color7  #7a91b0
color15 #c8d6e8
