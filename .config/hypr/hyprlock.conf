# ================================================================
# Hyprlock — Rimuru Tempest Lock Screen
# ================================================================

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

background {
    monitor =
    path    = ~/.config/hypr/wallpaper.jpg

    # Heavy blur — like looking through Rimuru's slime body
    blur_passes          = 4
    blur_size            = 9
    brightness           = 0.55
    contrast             = 0.95
    vibrancy             = 0.25
    vibrancy_darkness    = 0.4
}

# ── Clock — big & glowing ──────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color       = rgba(00e5ffee)
    font_size   = 80
    font_family = JetBrainsMono Nerd Font Bold
    position    = 0, 120
    halign      = center
    valign      = center
    # Text shadow effect via color trick
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "<b>$(date +'%A, %d %B %Y')</b>"
    color       = rgba(7a91b0cc)
    font_size   = 16
    font_family = JetBrainsMono Nerd Font
    position    = 0, 38
    halign      = center
    valign      = center
}

# ── Flavor text — Rimuru quote ────────────────────────────────
label {
    monitor     =
    text        = 「 That Which is Slime, Sees All 」
    color       = rgba(00e5ff55)
    font_size   = 11
    font_family = JetBrainsMono Nerd Font Italic
    position    = 0, 10
    halign      = center
    valign      = center
}

# ── Password input field ──────────────────────────────────────
input-field {
    monitor         =
    size            = 260, 52

    outline_thickness = 2
    dots_size         = 0.22
    dots_spacing      = 0.22
    dots_center       = true

    # Slime cyan outer, abyss inner
    outer_color  = rgba(00e5ffcc)
    inner_color  = rgba(0a0e1af0)
    font_color   = rgba(c8d6e8ff)

    fade_on_empty    = true
    fade_timeout     = 1200
    placeholder_text = <span foreground="##4a607a"><i> Enter password...</i></span>
    hide_input       = false
    rounding         = 12

    check_color    = rgba(00e676ff)
    fail_color     = rgba(ff5252ff)
    fail_text      = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(ffb300ff)
    numlock_color  = rgba(ffb300ff)

    position = 0, -130
    halign   = center
    valign   = center
}
