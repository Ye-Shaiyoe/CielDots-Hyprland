# /* ---- 💫 CielDots — Rimuru Tempest 💫 ---- */
# Inspired by JaKooLit's Hyprland-Dots style
# https://github.com/JaKooLit/Hyprland-Dots

include ./themes/rimuru.conf
# Dynamic theme (auto-generated by colorscheme.py — overrides rimuru.conf above).
# colorscheme.py writes ~/.config/kitty/themes/dynamic.conf on each wallpaper change.
# Kitty merges both files: dynamic.conf values take priority.
# To force Rimuru always, comment out or remove the next line:
include ./themes/dynamic.conf

font_family          JetBrainsMono Nerd Font Mono
bold_font            auto
italic_font          auto
bold_italic_font     auto
font_size            14.0

cursor_shape              beam
cursor_beam_thickness     1.6
cursor_blink_interval     0.5
cursor_stop_blinking_after 12.0
cursor_trail              1
cursor_trail_decay        0.1 0.2

window_padding_width        10
hide_window_decorations     yes

# Opacity — Hyprland blur renders what's BEHIND this transparent window.
# Lower = more wallpaper blur visible. 0.75-0.85 is the sweet spot.
background_opacity          0.82
dynamic_background_opacity  yes

# When focused: slightly more opaque so text is readable
# When unfocused: more transparent so blur is more visible
# (Hyprland handles the actual per-window opacity via windowrulev2)

confirm_os_window_close     0

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines       2000
wheel_scroll_min_lines 1

# ── Tab bar ──────────────────────────────────────────────────
tab_bar_style              powerline
tab_powerline_style        round
tab_bar_min_tabs           2
tab_title_template         " {index}: {title} "
active_tab_font_style      bold
inactive_tab_font_style    normal

# ── Selection ────────────────────────────────────────────────
selection_foreground none
selection_background none

# ── Display ──────────────────────────────────────────────────
linux_display_server auto

# ── Bell ─────────────────────────────────────────────────────
enable_audio_bell no

# ── Shell integration ─────────────────────────────────────────
shell_integration enabled

# ── Keybindings ──────────────────────────────────────────────
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+enter  new_window_with_cwd
map ctrl+shift+]      next_tab
map ctrl+shift+[      previous_tab
map ctrl+equal        change_font_size all +1.0
map ctrl+minus        change_font_size all -1.0
map ctrl+0            change_font_size all 0
