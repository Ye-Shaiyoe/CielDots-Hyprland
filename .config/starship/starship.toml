# ================================================================
# Starship — Rimuru Tempest Prompt
# Slime cyan · Magic purple · Abyss navy
# ================================================================

format = """
[╭](overlay) $os$username$hostname$directory$git_branch$git_status$python$nodejs$rust$golang$docker_context
[╰](overlay)$character"""

add_newline = true
palette     = "rimuru"

# ── Rimuru Tempest Palette ────────────────────────────────────
[palettes.rimuru]
abyss   = "#0a0e1a"
deep    = "#0d1420"
storm   = "#111827"
overlay = "#1a2540"
slate   = "#263354"
silver  = "#c8d6e8"
mist    = "#7a91b0"
ghost   = "#4a607a"
cyan    = "#00e5ff"
blue    = "#29b6f6"
teal    = "#00bcd4"
purple  = "#7c4dff"
violet  = "#aa80ff"
green   = "#00e676"
amber   = "#ffb300"
red     = "#ff5252"
pink    = "#f06292"

# ── OS icon ───────────────────────────────────────────────────
[os]
disabled = false
style    = "bold cyan"

[os.symbols]
Gentoo  = " "
Arch    = " "
Ubuntu  = " "
Debian  = " "
Fedora  = " "
Windows = " "
Macos   = " "

# ── Username ──────────────────────────────────────────────────
[username]
style_user  = "bold blue"
style_root  = "bold red"
format      = "[$user]($style) "
disabled    = false
show_always = false

# ── Hostname ─────────────────────────────────────────────────
[hostname]
ssh_only = true
format   = "[@$hostname](bold violet) "

# ── Directory — slime trail ───────────────────────────────────
[directory]
style              = "bold cyan"
format             = "[$path]($style)[$read_only]($read_only_style) "
truncation_length  = 4
truncate_to_repo   = true
read_only          = " 󰌾"
read_only_style    = "red"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Videos"    = " "
"~"         = "󱃔 "

# ── Git branch ────────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "bold green"
format = "[$symbol$branch]($style) "
truncation_length = 22

# ── Git status ────────────────────────────────────────────────
[git_status]
style      = "bold red"
format     = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
stashed    = "󰏗"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

# ── Languages ─────────────────────────────────────────────────
[python]
symbol = " "
style  = "bold amber"
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style  = "bold violet"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style  = "bold teal"
format = "[$symbol$version]($style) "

[docker_context]
symbol = " "
style  = "bold blue"
format = "[$symbol$context]($style) "

# ── Prompt character — slime orb ─────────────────────────────
# ❯ in cyan when ok, red when error
[character]
success_symbol = "[❯](bold cyan)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold violet)"

# ── Command duration ──────────────────────────────────────────
[cmd_duration]
style       = "bold amber"
format      = "[ $duration]($style) "
min_time    = 2000

# ── Time ─────────────────────────────────────────────────────
[time]
disabled      = false
style         = "bold ghost"
format        = "[$time]($style) "
time_format   = "%H:%M"
